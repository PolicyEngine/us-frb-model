name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check src tests examples
      - name: Tests (includes tracking-invariant and cross-validation gates)
        run: uv run pytest -q

  # The vendor pyfrbus environment (patched copy, pandas<2) is exercised via
  # scripts/generate_vendor_reference.sh, which regenerates the committed
  # cross-validation reference. Run on demand; failures here do not gate.
  vendor-reference:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: bash scripts/generate_vendor_reference.sh
