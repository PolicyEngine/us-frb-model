name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly heavier revalidation: Mondays 05:17 UTC.
    - cron: "17 5 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check src tests examples scripts
      - name: Tests
        run: uv run pytest -q

  # Hard correctness gates, run as separate steps so a failure names the
  # invariant that broke. These MUST pass: no continue-on-error, and the
  # tolerances are not to be loosened to make a red build green.
  #   * tracking invariant: baseline reproduces LONGBASE to < 1e-8 abs
  #   * cross-validation:   matches the Fed's pyfrbus to < 1e-6 abs and rel
  #   * economic sanity:    monetary tightening IRF inside a documented band
  # See VALIDATION.md for the derivation of each tolerance.
  correctness-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Gate - tracking invariant (baseline reproduces LONGBASE < 1e-8)
        run: uv run pytest -q --no-header -rA tests/test_tracking.py
      - name: Gate - cross-validation vs committed pyfrbus reference (< 1e-6)
        run: >-
          uv run pytest -q --no-header -rA
          tests/test_shock.py::test_cross_validation_vs_pyfrbus
      - name: Gate - monetary IRF economic sanity
        run: >-
          uv run pytest -q --no-header -rA
          tests/test_shock.py::test_monetary_irf_economic_sanity

  # Regenerates the cross-validation reference by actually running the Fed's
  # pyfrbus (vendor/pyfrbus_package, patched copy in a throwaway py3.11 venv)
  # and gates this implementation against that FRESH solution -- so the vendor
  # check exercises the vendor code, not just a committed CSV. Also verifies
  # the committed anchor has not drifted from the vendor. Runs on every
  # PR/push; failures gate. Takes ~1 minute.
  vendor-reference:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [monetary, fiscal_egfe, tax_trp, taylor_noninertial]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Regenerate vendor reference from vendor/pyfrbus_package
        run: >-
          bash scripts/generate_vendor_reference.sh
          "$RUNNER_TEMP/fresh_vendor.csv" "${{ matrix.scenario }}"
      - name: Gate - ours vs freshly generated vendor solution (< 1e-6)
        env:
          FRESH_VENDOR_CSV: ${{ runner.temp }}/fresh_vendor.csv
          VENDOR_SCENARIO: ${{ matrix.scenario }}
        run: uv run pytest -q --no-header -rA tests/test_shock.py
      - name: Gate - committed reference has not drifted from vendor
        env:
          FRESH_VENDOR_CSV: ${{ runner.temp }}/fresh_vendor.csv
          VENDOR_SCENARIO: ${{ matrix.scenario }}
        run: uv run python scripts/check_reference_drift.py
      - name: Fail if the committed reference was modified in place
        run: git diff --exit-code -- tests/data/

  # Heavier revalidation on a schedule: the full suite on every supported
  # Python, plus the vendor regeneration gate, so drift in transitive
  # dependencies surfaces even when nobody opens a PR.
  scheduled-validation:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Full suite with gates
        run: uv run pytest -q --no-header -rA
      - name: Regenerate vendor reference
        run: bash scripts/generate_vendor_reference.sh "$RUNNER_TEMP/fresh_vendor.csv"
      - name: Gate - ours vs freshly generated vendor solution
        env:
          FRESH_VENDOR_CSV: ${{ runner.temp }}/fresh_vendor.csv
        run: uv run pytest -q --no-header -rA tests/test_shock.py
      - name: Gate - committed reference has not drifted from vendor
        env:
          FRESH_VENDOR_CSV: ${{ runner.temp }}/fresh_vendor.csv
        run: uv run python scripts/check_reference_drift.py
